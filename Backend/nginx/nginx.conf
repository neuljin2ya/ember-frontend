worker_processes auto;
events { worker_connections 1024; }

http {
  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 20m;

  # WebSocket upgrade 용 map
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream backend {
    server backend:8080;
  }

  # HTTP → HTTPS 리다이렉트
  server {
    listen 80 default_server;
    server_name ember-app.duckdns.org;

    # certbot 인증서 갱신용
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Nginx 자체 헬스체크 (HTTP로도 응답)
    location = /health {
      return 200 'ok';
      add_header Content-Type text/plain;
    }

    # 나머지는 HTTPS로 리다이렉트
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # HTTPS
  server {
    listen 443 ssl;
    server_name ember-app.duckdns.org;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Nginx 자체 헬스체크
    location = /health {
      return 200 'ok';
      add_header Content-Type text/plain;
    }

    # AI 내부 API는 절대 외부 노출 금지
    location /internal/ {
      return 403;
    }

    # WebSocket (STOMP 채팅) — 반드시 일반 location보다 위
    location /ws/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # 관리자 API (Vercel에서 호출)
    location /api/admin/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
    }

    # 사용자 API
    location /api/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
      proxy_connect_timeout 10s;
    }

    # Swagger UI
    location /swagger-ui/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OpenAPI JSON (Swagger UI가 내부적으로 호출)
    location /v3/api-docs/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # DB 대시보드
    location = /dashboard {
      alias /usr/share/nginx/html/dashboard.html;
      default_type text/html;
    }

    # 루트 fallback
    location / {
      return 404;
    }
  }
}
