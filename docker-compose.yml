services:
  nginx:
    image: nginx:1.27-alpine
    container_name: ember-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Backend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dashboard.html:/usr/share/nginx/html/dashboard.html:ro
      - /etc/letsencrypt/live/ember-app.duckdns.org/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
      - /etc/letsencrypt/live/ember-app.duckdns.org/privkey.pem:/etc/nginx/certs/privkey.pem:ro
      - /etc/letsencrypt/archive/ember-app.duckdns.org:/etc/letsencrypt/archive/ember-app.duckdns.org:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ember-net

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: ember-backend
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      JAVA_TOOL_OPTIONS: "-Xms256m -Xmx512m"
      SPRING_PROFILES_ACTIVE: prod
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      AI_SERVICE_URL: http://ai:8000
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ember-net

  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: ember-ai
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      BACKEND_URL: http://backend:8080
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      HF_HOME: /models
      TRANSFORMERS_CACHE: /models
    volumes:
      - hf_models:/models
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ember-net

  redis:
    image: redis:7-alpine
    container_name: ember-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - ember-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ember-rabbitmq
    expose:
      - "5672"
      - "15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - ember-net

networks:
  ember-net:
    driver: bridge

volumes:
  redis_data:
  rabbitmq_data:
  hf_models:
